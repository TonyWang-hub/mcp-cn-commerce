name: Publish All Packages to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Run the full quality suite first; release is gated on it passing.
  quality:
    uses: ./.github/workflows/test.yml

  publish-main:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and publish main package
        run: |
          pip install build twine
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}

  publish-platforms:
    runs-on: ubuntu-latest
    needs: [publish-main]
    strategy:
      matrix:
        platform:
          - oceanengine
          - doudian
          - jd
          - taobao
          - pinduoduo
          - kuaishou
          - xiaohongshu
          - weixin-store
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and publish ${{ matrix.platform }}
        run: |
          pip install build twine hatchling
          cd servers/${{ matrix.platform }}
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        env:
          PLATFORM: ${{ matrix.platform }}
