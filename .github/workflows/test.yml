name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx mcp

      - name: Install server packages (editable)
        run: |
          pip install -e servers/oceanengine/
          pip install -e servers/doudian/
          pip install -e servers/jd/

      - name: Run tests
        run: |
          python -m pytest servers/ -v --tb=short
