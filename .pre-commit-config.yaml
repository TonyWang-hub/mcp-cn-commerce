repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length=120]
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, httpx, pyaes]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy servers/ shared/ tests/

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.6
    hooks:
      - id: pylint
        additional_dependencies: [mcp, httpx, pyaes]
        args:
          - --rcfile=pyproject.toml
          - --disable=import-error
        files: ^(servers|shared|tests)/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, --recursive]
        files: ^(servers|shared)/.*\.py$
        additional_dependencies: ["bandit[toml]"]
